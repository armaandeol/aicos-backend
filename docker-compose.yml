# docker-compose.yml
version: '3.8'

services:
  # Django Web Application
  web:
    build: .
    container_name: aicos-backend
    restart: always
    env_file:
      - .env
    environment:
      # Database - Using your Neon PostgreSQL
      - DATABASE_URL=${DATABASE_URL}
      
      # Django Settings
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,147.93.108.82}
      
      # DeepSeek API
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      
      # R2 Storage
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      
      # AWS S3 Compatible Settings (for R2)
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${R2_BUCKET_NAME}
      - AWS_S3_ENDPOINT_URL=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
      - AWS_S3_REGION_NAME=auto
      - AWS_S3_SIGNATURE_VERSION=s3v4
      - AWS_QUERYSTRING_AUTH=True
      
      # Environment
      - DJANGO_SETTINGS_MODULE=core.settings.prod
      - PYTHONUNBUFFERED=1
      
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        python manage.py migrate --noinput &&
        echo 'Collecting static files...' &&
        python manage.py collectstatic --noinput &&
        echo 'Starting Gunicorn...' &&
        gunicorn --bind 0.0.0.0:8000 
                --workers 4 
                --threads 2 
                --timeout 120 
                --max-requests 1000 
                --max-requests-jitter 100 
                core.wsgi:application
      "
    ports:
      - "8082:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
